# Global configuration

global:
  namespace: intelligent-cd

inference:
  model: "my-model"
  url: "https://URL:PORT/v1"
  apiToken: ""
  tlsVerify: "true"
  maxTokens: 300000

llamaStack:
  name: llama-stack
  # Optional: Override the default distribution name "rh-dev" with a custom image
  # image: "registry.redhat.io/rhoai/odh-llama-stack-core-rhel9:v3.2"
  ingress:
    enabled: true
  postgresql:
    name: postgres
    image: "registry.redhat.io/rhel9/postgresql-15:9.7"
    database: "llamastack"
    user: "llamastack"
    password: "SecurePassword123"  # Change this for production deployments
    storageSize: "20Gi"
    ssl: false
  embeddings:
    remote: false
    url: ""
    apiToken: ""
    maxTokens: ""
  websearch:
    tavilyApiKey: ""

# S3/MinIO bucket configuration (shared across components)
s3Bucket:
  connection:
    secretName: minio-connection-secret
    username: "minio"
    password: "minio123"
    endpoint: "minio.minio.svc.cluster.local"
    port: '9000'
    region: "none"
    scheme: "http"

pipelines:
  enabled: true
  namespaceSuffix: "-pipelines"

RAG:
  enabled: true
  vector_db_id: "app-documentation"
  git_repo: "https://github.com/alpha-hack-program/intelligent-cd-iberia.git"
  git_branch: "main"
  git_docs_path: "intelligent-cd-docs"

gradioUI:
  name: gradio
  image: "quay.io/alopezme/intelligent-cd-gradio:latest"

  # Enable this to Apply resources from Gradio to the Cluster
  serviceAccount:
    create: true
    name: "gradio"
    rbac:
      clusterRole: "cluster-admin" # cluster-admin / view / edit

  config:
    argocd:
      base_url: "https://openshift-gitops-server.openshift-gitops:443"
      api_token: "<Token>"
    github:
      pat: "<Token>"
      toolsets: "pull_requests, repos, issues"
      readonly: "true"

    # Shared LLM settings (apply to all tabs/steps)
    temperature: 0.1
    max_infer_iters: 30

    # Tools use JSON format (same format the /v1/responses API expects).
    # Available tool types:
    #   {"type": "mcp", "server_label": "<name>", "server_url": "<url>"}
    #   {"type": "file_search", "vector_db_names": ["<name>"]}
    chat_tab:
      tools: '[{"type":"mcp","server_label":"openshift","server_url":"http://ocp-mcp-server:8080/sse"},{"type":"mcp","server_label":"argocd","server_url":"http://mcp-for-argocd:3000/sse"},{"type":"mcp","server_label":"github","server_url":"https://api.githubcopilot.com/mcp/"},{"type":"file_search","vector_db_names":["app-documentation"]}]'

    form_tab:
      generate_resources:
        tools: '[]'
      apply_best_practices:
        tools: '[{"type":"file_search","vector_db_names":["gitops-documentation"]}]'
      generate_helm:
        tools: '[{"type":"file_search","vector_db_names":["gitops-documentation"]}]'
      push_github:
        # Currently uses PyGithub directly (no LLM/MCP needed).
        # [MCP-GITHUB-ALTERNATIVE] Restore the MCP tool below when Llama Stack
        # supports Streamable HTTP transport for MCP tools.
        # tools: '[{"type":"mcp","server_label":"github","server_url":"https://api.githubcopilot.com/mcp/"}]'
        tools: '[]'
      generate_argocd:
        # [ARGOCD-LLM-ALTERNATIVE] Currently uses Python template + PyGithub.
        # Restore the MCP tools below to use LLM+MCP instead.
        # tools: '[{"type":"mcp","server_label":"openshift","server_url":"http://ocp-mcp-server:8080/sse"},{"type":"mcp","server_label":"argocd","server_url":"http://mcp-for-argocd:3000/sse"},{"type":"file_search","vector_db_names":["gitops-documentation"]}]'
        tools: '[]'
      validate_deployment:
        tools: '[{"type":"mcp","server_label":"openshift","server_url":"http://ocp-mcp-server:8080/sse"}]'
      validate_argocd:
        tools: '[{"type":"mcp","server_label":"openshift","server_url":"http://ocp-mcp-server:8080/sse"},{"type":"mcp","server_label":"argocd","server_url":"http://mcp-for-argocd:3000/sse"}]'

  env:
    LOG_LEVEL: "DEBUG" # DEBUG, INFO, WARNING, ERROR, CRITICAL
    GITHUB_GITOPS_REPO: ""

  # Resources
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1500m"
      memory: "2Gi"

# OCP MCP Server (vendored upstream chart as subchart)
kubernetes-mcp-server:
  fullnameOverride: ocp-mcp-server
  openshift: true
  ingress:
    enabled: false
  serviceAccount:
    create: true
  rbac:
    create: true
    extraClusterRoleBindings:
      - name: view
        roleRef:
          name: view
          external: true
  config:
    port: "8080"
    disable_destructive: true
    log_level: 5

# Other MCP servers (custom templates)
mcpServers:
  mcpForArgocd:
    name: mcp-for-argocd
    image: "ghcr.io/argoproj-labs/mcp-for-argocd:v0.5.0"
    mcpServer:
      port: 3000
      args:
        - "node"
        - "dist/index.js"
        - "sse"
    serviceAccount:
      create: false
      # Service account name (required if create=true, optional if create=false for existing SA)
      name: default
      
  servicenowMcp:
    name: servicenow-mcp
    image: "quay.io/alopezme/servicenow-mcp:latest"
    mcpServer:
      port: 8080
    env:
      SERVICENOW_INSTANCE_URL: "https://devInstance.service-now.com"
      SERVICENOW_USERNAME: "your-username"
      SERVICENOW_PASSWORD: "your-password"
      SERVICENOW_AUTH_TYPE: "basic"
      SERVICENOW_TOOL_PACKAGE: "service_desk"