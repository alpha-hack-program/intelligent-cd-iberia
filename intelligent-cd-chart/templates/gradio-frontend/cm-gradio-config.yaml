---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.gradioUI.name }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.gradioUI.name }}
data:
  # Shared LLM settings
  TEMPERATURE: {{ .Values.gradioUI.config.temperature | quote }}
  MAX_INFER_ITERS: {{ .Values.gradioUI.config.max_infer_iters | quote }}

  # Chat tab
  CHAT_PROMPT: |-
    {{- tpl ($.Files.Get "conf/app/chat_prompt.md") . | nindent 4 }}
  CHAT_TOOLS: {{ .Values.gradioUI.config.chat_tab.tools | quote }}

  # Form tab - per-step tools and prompts
  FORM_GENERATE_RESOURCES_PROMPT: ""
  FORM_GENERATE_RESOURCES_TOOLS: {{ .Values.gradioUI.config.form_tab.generate_resources.tools | quote }}
  FORM_APPLY_BEST_PRACTICES_PROMPT: |-
    {{- tpl ($.Files.Get "conf/app/form_apply_best_practices_prompt.md") . | nindent 4 }}
  FORM_APPLY_BEST_PRACTICES_TOOLS: {{ .Values.gradioUI.config.form_tab.apply_best_practices.tools | quote }}
  FORM_GENERATE_HELM_PROMPT: |-
    {{- tpl ($.Files.Get "conf/app/form_generate_helm_prompt.md") . | nindent 4 }}
  FORM_GENERATE_HELM_TOOLS: {{ .Values.gradioUI.config.form_tab.generate_helm.tools | quote }}
  FORM_PUSH_GITHUB_PROMPT: |-
    {{- tpl ($.Files.Get "conf/app/form_push_github_prompt.md") . | nindent 4 }}
  FORM_PUSH_GITHUB_TOOLS: {{ .Values.gradioUI.config.form_tab.push_github.tools | quote }}
  FORM_GENERATE_ARGOCD_PROMPT: |-
    {{- tpl ($.Files.Get "conf/app/form_generate_argocd_prompt.md") . | nindent 4 }}
  FORM_GENERATE_ARGOCD_TOOLS: {{ .Values.gradioUI.config.form_tab.generate_argocd.tools | quote }}
  FORM_VALIDATE_DEPLOYMENT_PROMPT: "You are a Kubernetes deployment validator. Use the MCP tools to check pod health, events, and logs. Diagnose any issues you find."
  FORM_VALIDATE_DEPLOYMENT_TOOLS: {{ .Values.gradioUI.config.form_tab.validate_deployment.tools | quote }}
  FORM_VALIDATE_ARGOCD_PROMPT: "You are a GitOps deployment validator. Use both the ArgoCD and OpenShift MCP tools to verify the deployment is healthy."
  FORM_VALIDATE_ARGOCD_TOOLS: {{ .Values.gradioUI.config.form_tab.validate_argocd.tools | quote }}
